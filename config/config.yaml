# ─────────────────────────────────────────────────────────────────
#  Ovarian Cancer Platinum Response Prediction — Configuration
# ─────────────────────────────────────────────────────────────────

project:
  name: "Ovarian Cancer Platinum Response"
  seed: 42
  version: "1.0.0"

# ── Data paths ──────────────────────────────────────────────────
data:
  data_dir: "data/raw/ov_tcga_pan_can_atlas_2018"        # relative to project root
  clinical_file: "data_clinical_patient.txt"
  treatment_file: "data_timeline_treatment.txt"
  expression_file: "data_mrna_seq_v2_rsem.txt"

# ── Clinical / label settings ────────────────────────────────────
clinical:
  time_col: "OS_MONTHS"
  status_col: "OS_STATUS"
  # Platinum-based drugs to identify treated patients
  platinum_drugs:
    - "CARBOPLATIN"
    - "CISPLATIN"
  # Survival thresholds (months) used to define response labels
  thresholds:
    - 12
    - 18
    - 24

# ── Feature engineering ──────────────────────────────────────────
features:
  top_n_genes: 500          # top-variance genes to retain

# ── Model training ───────────────────────────────────────────────
model:
  test_size: 0.20
  cv_folds: 5
  # Logistic Regression
  logistic_regression:
    max_iter: 5000
    penalty: "l2"
    class_weight: "balanced"
  # Random Forest
  random_forest:
    n_estimators: 300
    max_depth: null
    min_samples_split: 2
    class_weight: "balanced"
  # SVM
  svm:
    kernel: "rbf"
    C: 1
    gamma: "scale"
    probability: true
    class_weight: "balanced"

# ── Output settings ──────────────────────────────────────────────
output:
  figures_dir: "outputs/figures"
  models_dir: "outputs/models"
  results_dir: "outputs/results"
  figure_dpi: 300
